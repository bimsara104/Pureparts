<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PureParts – Under Maintenance</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue-dark:  #1a1f6e;
      --blue-mid:   #2d3bbd;
      --blue-light: #4a5de8;
      --purple:     #7c3aed;
      --accent:     #f59e0b;
      --white:      #ffffff;
      --text-sub:   rgba(255,255,255,0.70);
    }

    html, body {
      height: 100%;
      font-family: 'DM Sans', sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, var(--blue-dark) 0%, var(--blue-mid) 45%, var(--purple) 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      padding: 24px;
    }

    /* ── decorative circles ── */
    .circle {
      position: absolute;
      border-radius: 50%;
      opacity: 0.08;
      background: #fff;
      pointer-events: none;
    }
    .c1 { width: 500px; height: 500px; top: -160px; left: -160px; }
    .c2 { width: 320px; height: 320px; bottom: -100px; right: -80px; }
    .c3 { width: 180px; height: 180px; top: 60%; left: 10%; opacity: 0.05; }

    /* ── grid lines ── */
    .grid-overlay {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
    }

    /* ── card ── */
    .card {
      position: relative;
      z-index: 10;
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 20px;
      padding: 52px 48px 44px;
      max-width: 520px;
      width: 100%;
      text-align: center;
      box-shadow: 0 32px 80px rgba(0,0,0,0.35);
      animation: fadeUp 0.8s cubic-bezier(.22,1,.36,1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(32px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── logo / brand ── */
    .logo-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 36px;
    }

    .logo-icon {
      width: 40px; height: 40px;
      background: var(--accent);
      border-radius: 10px;
      display: grid;
      place-items: center;
    }

    .logo-icon svg { width: 22px; height: 22px; fill: #1a1f6e; }

    .logo-name {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.85rem;
      font-weight: 700;
      color: var(--white);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .logo-name span { color: var(--accent); }

    /* ── gear animation ── */
    .gear-wrap {
      margin: 0 auto 28px;
      width: 80px; height: 80px;
      position: relative;
    }

    .gear {
      position: absolute;
      animation: spin 4s linear infinite;
    }
    .gear-big  { width: 56px; height: 56px; top: 0; left: 0; }
    .gear-small { width: 34px; height: 34px; bottom: 0; right: 0; animation-direction: reverse; animation-duration: 2.5s; }

    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    /* ── headline ── */
    .headline {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.7rem;
      font-weight: 700;
      color: var(--white);
      letter-spacing: 0.02em;
      text-transform: uppercase;
      margin-bottom: 12px;
      line-height: 1.2;
    }

    .sub {
      font-size: 0.95rem;
      color: var(--text-sub);
      line-height: 1.7;
      margin-bottom: 32px;
    }

    /* ── divider ── */
    .divider {
      width: 60px; height: 3px;
      background: var(--accent);
      border-radius: 2px;
      margin: 0 auto 28px;
    }

    /* ── status pill ── */
    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(245,158,11,0.15);
      border: 1px solid rgba(245,158,11,0.35);
      color: var(--accent);
      font-size: 0.8rem;
      font-weight: 500;
      padding: 6px 14px;
      border-radius: 100px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 32px;
    }

    .dot {
      width: 7px; height: 7px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 1.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.7); }
    }

    /* ── contact box ── */
    .contact-box {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 24px;
    }

    .contact-box svg { width: 18px; height: 18px; flex-shrink: 0; }

    .contact-box a {
      color: var(--white);
      text-decoration: none;
      font-size: 0.92rem;
      font-weight: 500;
      letter-spacing: 0.01em;
      transition: color 0.2s;
    }

    .contact-box a:hover { color: var(--accent); }

    /* ── footer note ── */
    .footer-note {
      font-size: 0.78rem;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.03em;
    }

    /* ── responsive ── */
    @media (max-width: 480px) {
      .card { padding: 40px 28px 36px; }
      .headline { font-size: 1.4rem; }
    }
  </style>
</head>
<body>

  <div class="circle c1"></div>
  <div class="circle c2"></div>
  <div class="circle c3"></div>
  <div class="grid-overlay"></div>

      </svg>
    </div>

    <!-- Status -->
    <div class="status">
      <span class="dot"></span>
      Temporarily Unavailable
    </div>

    <!-- Text -->
    <h1 class="headline">We'll Be Back Soon!</h1>
    <div class="divider"></div>
    <p class="sub">
      PureParts is currently undergoing scheduled maintenance to bring you a better experience.<br>
      We'll be back online shortly. Thank you for your patience!
    </p>

    <!-- Contact -->
    <div class="contact-box">
      <!-- email icon -->
      <svg viewBox="0 0 24 24" fill="none" stroke="rgba(245,158,11,0.9)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
        <polyline points="22,6 12,13 2,6"/>
      </svg>
      <a href="mailto:account@pureparts.online">account@pureparts.online</a>
    </div>

    <p class="footer-note">© 2026 PureParts &nbsp;·&nbsp; Original Phone Parts &amp; Accessories</p>

  </div>

</body>
</html>
